<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSLE Error Tracker</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f0f4ff;
      --surface: #ffffff;
      --surface2: #f5f7ff;
      --border: #dde3f5;
      --accent: #6157e8;
      --accent2: #f59e0b;
      --green: #10b981;
      --green-dim: #d1fae5;
      --text: #1e1b4b;
      --text-muted: #6b7280;
      --text-dim: #a5b4fc;
      --danger: #ef4444;
      --cell-size: 34px;
      --header-w: 160px;
      --sync-color: var(--text-muted);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
    }

    /* ─── SYNC STATUS BAR ─── */
    .sync-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 24px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      color: var(--sync-color);
      min-height: 32px;
      transition: all .3s;
    }

    .sync-bar.offline {
      background: #fef3c7;
    }

    .sync-bar.error {
      background: #fee2e2;
    }

    .sync-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--sync-color);
      flex-shrink: 0;
      transition: background .3s;
    }

    .sync-bar.syncing {
      --sync-color: var(--accent2);
    }

    .sync-bar.syncing .sync-dot {
      animation: pulse-dot 1s ease-in-out infinite;
    }

    .sync-bar.ok {
      --sync-color: var(--green);
    }

    .sync-bar.error {
      --sync-color: var(--danger);
    }

    .sync-bar.offline {
      --sync-color: var(--text-dim);
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.4;
        transform: scale(0.7);
      }
    }

    /* ─── TOP BAR ─── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 28px;
      z-index: 100;
      gap: 16px;
      flex-wrap: wrap;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
      white-space: nowrap;
    }

    .logo span {
      color: var(--accent2);
    }

    .stats-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      white-space: nowrap;
    }

    .pill.green {
      border-color: var(--green);
      color: var(--green);
    }

    .pill.purple {
      border-color: var(--accent);
      color: var(--accent);
    }

    .topbar-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      padding: 8px 16px;
      transition: all .18s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .btn-accent {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 12px rgba(97, 87, 232, .30);
    }

    .btn-accent:hover {
      background: #9489ff;
      transform: translateY(-1px);
    }

    .btn-warn {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(248, 113, 113, .3);
    }

    .btn-warn:hover {
      background: rgba(248, 113, 113, .1);
    }

    /* ─── SUBJECT TABS ─── */
    .subject-tabs {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      background: var(--surface);
    }

    .tab {
      font-size: 13px;
      font-weight: 600;
      padding: 6px 18px;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid transparent;
      color: var(--text-muted);
      background: transparent;
      transition: all .18s;
      font-family: 'DM Sans', sans-serif;
    }

    .tab:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .tab-add {
      font-size: 18px;
      padding: 2px 10px;
      color: var(--text-dim);
      border: 1px dashed var(--border);
      border-radius: 8px;
      cursor: pointer;
      background: transparent;
      transition: all .18s;
    }

    .tab-add:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ─── MAIN ─── */
    .main {
      padding: 24px;
    }

    /* 上部に表示する横スクロールバー（テーブル本体のスクロールと同期） */
    .scroll-top {
      overflow-x: auto;
      overflow-y: hidden;
      height: 16px;
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      background: var(--surface2);
    }

    .scroll-top-inner {
      height: 1px;
    }

    .tracker-wrap {
      overflow: auto;
      border-radius: 0 0 12px 12px;
      border: 1px solid var(--border);
      max-height: calc(100vh - 180px);
      /* ネイティブの下スクロールバーは隠す（上のバーで操作するため） */
      scrollbar-width: none;
    }

    .tracker-wrap::-webkit-scrollbar {
      display: none;
    }

    /* thead は tracker-wrap 内でスティッキー */
    .tracker-wrap thead tr th {
      position: sticky;
      top: 0;
      z-index: 20;
    }

    table {
      border-collapse: collapse;
      min-width: max-content;
    }

    thead tr th {
      background: var(--surface2);
      font-size: 12px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 0;
      border-right: 1px solid var(--border);
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    th.school-col {
      width: var(--header-w);
      min-width: var(--header-w);
      padding: 12px 16px;
      text-align: left;
      position: sticky;
      left: 0;
      z-index: 30;
      background: var(--surface2);
    }

    th.q-num {
      width: var(--cell-size);
      min-width: var(--cell-size);
      text-align: center;
      padding: 10px 2px;
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
    }

    th.group-header {
      text-align: center;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
    }

    th.group-sep,
    td.group-sep {
      width: 6px;
      min-width: 6px;
      background: var(--bg);
      border: none;
      padding: 0;
    }

    tbody tr {
      transition: background .12s;
    }

    tbody tr:hover {
      background: rgba(97, 87, 232, .06);
    }

    /* school-cell の sticky hover 背景 */
    tbody tr.level-row-D:hover~tr.level-row-E td.school-cell,
    tbody tr.level-row-D:hover~tr.level-row-REQ td.school-cell {
      background: #eef0ff;
    }

    tbody tr td {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    td.school-cell {
      position: sticky;
      left: 0;
      z-index: 5;
      background: var(--surface);
      padding: 0 16px;
      height: 44px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      min-width: var(--header-w);
      border-right: 2px solid var(--border) !important;
    }

    tbody tr:hover td.school-cell {
      background: #eef0ff;
    }

    .school-name-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .school-badge {
      display: inline-block;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      line-height: 24px;
      flex-shrink: 0;
    }

    .school-del {
      opacity: 0;
      cursor: pointer;
      color: var(--danger);
      font-size: 14px;
      background: none;
      border: none;
      transition: opacity .15s;
      font-family: 'DM Sans', sans-serif;
    }

    .school-edit {
      opacity: 0;
      cursor: pointer;
      color: var(--accent);
      font-size: 14px;
      background: none;
      border: none;
      transition: opacity .15s;
      font-family: 'DM Sans', sans-serif;
    }

    tbody tr:hover .school-del {
      opacity: 0.6;
    }

    tbody tr:hover .school-edit {
      opacity: 0.6;
    }

    .school-del:hover {
      opacity: 1 !important;
    }

    .school-edit:hover {
      opacity: 1 !important;
    }

    /* level label cell */
    td.level-cell {
      width: 28px;
      min-width: 28px;
      text-align: center;
      padding: 0;
      border-right: 1px solid var(--border);
      vertical-align: middle;
    }

    .level-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .level-D {
      background: rgba(14, 165, 233, .15);
      color: #0284c7;
    }

    .level-E {
      background: rgba(245, 158, 11, .18);
      color: #b45309;
    }

    .level-REQ {
      background: rgba(239, 68, 68, .15);
      color: #dc2626;
    }

    /* row borders for level grouping */
    tr.level-row-D td,
    tr.level-row-E td,
    tr.level-row-REQ td {
      border-bottom: none;
    }

    tr.level-row-E td {
      border-top: 1px solid var(--border);
    }

    tr.level-row-REQ td {
      border-top: 1px solid var(--border);
      border-bottom: 3px solid #c7d2fe;
    }

    /* school group separator: D行の上に太い区切り線 */
    tr.level-row-D td {
      border-top: 4px solid #6157e8;
    }

    tr.level-row-REQ td {
      border-top: 1px solid var(--border);
      border-bottom: 4px solid #6157e8;
    }

    /* 学校ごとの背景色（偶数・奇数）— よりはっきり区別 */
    tr.school-odd td {
      background: #ffffff;
    }

    tr.school-even td {
      background: #e8edff;
    }

    tr.school-odd td.school-cell {
      background: #ffffff;
      border-left: 4px solid transparent !important;
    }

    tr.school-even td.school-cell {
      background: #e8edff;
      border-left: 4px solid #6157e8 !important;
    }

    tr.school-odd:hover td,
    tr.school-even:hover td {
      background: #fef3c7 !important;
    }

    tr.school-odd:hover td.school-cell,
    tr.school-even:hover td.school-cell {
      background: #fef3c7 !important;
    }

    tr.school-odd td.row-progress {
      background: #ffffff;
    }

    tr.school-even td.row-progress {
      background: #e8edff;
    }

    tr.school-odd:hover td.row-progress,
    tr.school-even:hover td.row-progress {
      background: #fef3c7 !important;
    }

    /* チェック済みセルの背景は学校色より優先 */
    tr.school-odd td.check-cell .check-btn.checked,
    tr.school-even td.check-cell .check-btn.checked {
      background: var(--green-dim);
    }

    tr.school-odd td.check-cell .check-btn.checked:hover,
    tr.school-even td.check-cell .check-btn.checked:hover {
      background: #a7f3d0;
    }

    td.check-cell {
      width: var(--cell-size);
      min-width: var(--cell-size);
      text-align: center;
      padding: 0;
      cursor: pointer;
      position: relative;
    }

    .check-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 44px;
      cursor: pointer;
      transition: background .15s;
    }

    .check-btn:hover {
      background: rgba(97, 87, 232, .10);
    }

    .check-btn.checked {
      background: var(--green-dim);
    }

    .check-btn.checked:hover {
      background: #a7f3d0;
    }

    .check-icon {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 3px solid #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .18s;
      font-size: 14px;
      flex-shrink: 0;
      background: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6);
    }

    .check-btn:hover .check-icon {
      border-color: var(--accent);
      border-width: 3px;
    }

    .check-btn.checked .check-icon {
      background: var(--green);
      border-color: var(--green);
      border-width: 3px;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
    }

    td.row-progress {
      padding: 0 12px;
      width: 80px;
      min-width: 80px;
      position: sticky;
      right: 0;
      background: var(--surface);
      border-left: 2px solid var(--border) !important;
      z-index: 5;
    }

    tbody tr:hover td.row-progress {
      background: #eef0ff;
    }

    .row-pct {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-align: center;
    }

    .row-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin-top: 4px;
      overflow: hidden;
    }

    .row-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 99px;
      transition: width .3s ease;
    }

    tr.add-row td {
      background: #f8f9ff;
      border-top: 2px dashed var(--border);
    }

    .add-school-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      transition: color .15s;
      white-space: nowrap;
    }

    .add-school-btn:hover {
      color: var(--accent);
    }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(30, 27, 75, .45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(97, 87, 232, .15);
    }

    .modal h2 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      color: var(--text);
      margin-bottom: 20px;
    }

    .modal-field {
      margin-bottom: 14px;
    }

    .modal-field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .modal-field input,
    .modal-field select {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 14px;
      outline: none;
      transition: border .18s;
    }

    .modal-field input:focus,
    .modal-field select:focus {
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    /* GAS setup modal */
    .gas-url-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    .gas-url-hint a {
      color: var(--accent);
      text-decoration: none;
    }

    .subject-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }

    .subject-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
    }

    .subject-item input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      outline: none;
    }

    .subject-item input.q-count {
      width: 60px;
      flex: none;
      text-align: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
    }

    .sub-del {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      padding: 0 4px;
      transition: color .15s;
    }

    .sub-del:hover {
      color: var(--danger);
    }



    /* confetti */
    @keyframes cf {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(var(--cx), var(--cy)) rotate(540deg) scale(0);
        opacity: 0;
      }
    }

    .cf {
      position: fixed;
      width: 7px;
      height: 7px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 9999;
      animation: cf .7s ease-out forwards;
    }

    /* ─── LEVEL PROGRESS ─── */
    td.level-progress {
      border-left: 2px solid var(--border) !important;
    }

    .empty-row td {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
      font-size: 14px;
      border: none !important;
    }

    /* loading overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(240, 244, 255, .88);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      backdrop-filter: blur(4px);
    }

    .loading-overlay.show {
      display: flex;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      :root {
        --header-w: 110px;
        --cell-size: 30px;
      }

      .main {
        padding: 12px;
      }

      .topbar {
        padding: 12px 16px;
        top: 28px;
      }

      .logo {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- SYNC STATUS BAR -->
    <div class="sync-bar offline" id="sync-bar">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">スプレッドシートURL未設定 — ローカル保存中</span>
      <button onclick="openGasModal()"
        style="background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:2px 10px;font-size:10px;font-weight:700;cursor:pointer;margin-left:8px;font-family:'DM Sans',sans-serif;">設定</button>
    </div>

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo">PSLE <span>Error Tracker</span></div>
        <div class="stats-pills" id="stats-pills"></div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost" onclick="openSubjectModal()">⚙️ 科目編集</button>
      </div>
    </div>

    <!-- SUBJECT TABS -->
    <div class="subject-tabs" id="subject-tabs"></div>

    <!-- MAIN -->
    <div class="main">
      <!-- 上部の横スクロールバー（下のテーブルと連動） -->
      <div class="scroll-top" id="scroll-top">
        <div class="scroll-top-inner" id="scroll-top-inner"></div>

  <div class="modal-overlay" id="modal-gas">

  <!-- ADD SCHOOL MODAL -->
  <div class="modal-overlay" id="modal-school">

  <!-- RENAME SCHOOL MODAL -->
  <div class="modal-overlay" id="modal-rename-school">
    <div class="modal">

      <div class="modal-field">
        <label>新しい学校名</label>
        <input type="text" id="inp-rename-school" placeholder="例: Raffles Primary" maxlength="30">
        <input type="hidden" id="inp-rename-idx">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('modal-rename-school')">キャンセル</button>
        <button class="btn btn-accent" onclick="renameSchool()">保存</button>

  <!-- SUBJECT SETTINGS MODAL -->
  <div class="modal-overlay" id="modal-subjects">
    <div class="modal">
      <h2>⚙️ 科目・問題数の設定</h2>
      <div class="subject-list" id="subject-list"></div>
      <button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="addSubjectRow()">＋ 科目を追加</button>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('modal-subjects')">キャンセル</button>
        <button class="btn btn-accent" onclick="saveSubjects()">保存</button>
      </div>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════════
    //  ★★★ GAS URL を直接埋め込む場合はここに貼り付け ★★★
    //  例: const EMBEDDED_GAS_URL = 'https://script.google.com/macros/s/AKfy.../exec';
    //  空文字列のままなら、これまで通り「設定」ボタンから入力する方式が使えます。
    //  値を入れた場合は、すべての端末で自動的にこのURLを使って同期されます。
    // ════════════════════════════════════════════════
    const EMBEDDED_GAS_URL = 'https://script.google.com/macros/s/AKfycbx-hY5kNl5-OTOVKL9ebhpxfCVTRzMU_pQOnW0LoyS3tm-sbkAYi8cGdeQmtqni93AJ/exec';

    // ════════════════════════════════════════════════
    //  CONSTANTS
    // ════════════════════════════════════════════════
    const SCHOOL_COLORS = [
      '#6157e8', '#f59e0b', '#10b981', '#ef4444', '#0ea5e9',
      '#ec4899', '#84cc16', '#f97316', '#a855f7', '#14b8a6',
      '#eab308', '#6366f1', '#22c55e', '#f43f5e', '#38bdf8'
    ];

    const DEFAULT_SUBJECTS = [
      { name: 'English', questions: 40 },
      { name: 'Maths', questions: 30 },
      { name: '国語', questions: 20 },
    ];

    const DEFAULT_SCHOOLS = [
      'Raffles Primary', 'Nanyang Primary', 'Tao Nan', 'Henry Park',
      'Ai Tong', 'Catholic High', 'CHIJ', 'Rosyth', 'Methodist Girls',
      'Red Swastika'
    ];

    const LS_KEY = 'psle-tracker-v2';
    const LS_GAS = 'psle-tracker-gas-url';

    // ════════════════════════════════════════════════
    //  STATE
    // ════════════════════════════════════════════════
    let state = loadLocalState();
    let currentSubjectIdx = 0;
    // 優先順位: HTML埋め込み > localStorage（設定ボタンから入れた値）
    // EMBEDDED_GAS_URL が設定されていれば常にそちらを使う（端末ごとの設定不要）
    let gasUrl = EMBEDDED_GAS_URL || localStorage.getItem(LS_GAS) || '';

    // Sync queue: pendingWrites batches changes before flush
    let pendingWrite = false;        // is a write queued?
    let syncTimer = null;         // debounce timer
    let lastSyncTime = null;

    // ════════════════════════════════════════════════
    //  LOCAL STORAGE (primary + fallback)
    // ════════════════════════════════════════════════
    function loadLocalState() {
      try {
        const saved = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
        if (saved && saved.subjects && saved.schools) return saved;
      } catch (e) { }
      const checks = {};
      DEFAULT_SCHOOLS.forEach(s => { checks[s] = {}; });
      return {
        subjects: DEFAULT_SUBJECTS,
        schools: DEFAULT_SCHOOLS.slice(),
        checks
      };
    }

    function saveLocal() {
      try {
        localStorage.setItem(LS_KEY, JSON.stringify(state));
      } catch (e) {
        console.warn('localStorage write failed', e);
      }
    }

    // ════════════════════════════════════════════════
    //  APPS SCRIPT API LAYER
    // ════════════════════════════════════════════════

    /**
     * Fetch full state from GAS (GET ?action=load)
     * Returns parsed state object or null on failure.
     */
    async function gasLoad() {
      if (!gasUrl) return null;
      try {
        const res = await fetch(gasUrl + '?action=load', {
          method: 'GET',
          mode: 'cors',
          cache: 'no-store',
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        if (json && json.subjects && json.schools) return json;
        return null;
      } catch (e) {
        console.warn('gasLoad failed:', e);
        return null;
      }
    }

    /**
     * Write full state to GAS (POST with JSON body)
     * Returns true on success.
     */
    async function gasSave(stateToSave) {
      if (!gasUrl) return false;
      try {
        const res = await fetch(gasUrl, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'text/plain' }, // avoid preflight issues with GAS
          body: JSON.stringify({ action: 'save', data: stateToSave }),
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        return json && json.ok === true;
      } catch (e) {
        console.warn('gasSave failed:', e);
        return false;
      }
    }

    // ════════════════════════════════════════════════
    //  SYNC ORCHESTRATION
    // ════════════════════════════════════════════════

    /** Called on every state mutation: saves locally + debounces remote write */
    function save() {
      saveLocal();
      if (gasUrl) scheduleSyncWrite();
    }

    function scheduleSyncWrite() {
      pendingWrite = true;
      if (syncTimer) clearTimeout(syncTimer);
      // Debounce: wait 1.2 s after last change before writing to GAS
      // This batches rapid checkbox clicks into a single network call
      syncTimer = setTimeout(flushSyncWrite, 1200);
    }

    async function flushSyncWrite() {
      if (!pendingWrite || !gasUrl) return;
      pendingWrite = false;
      setSyncStatus('syncing', '同期中...');
      const ok = await gasSave(state);
      if (ok) {
        lastSyncTime = new Date();
        setSyncStatus('ok', '同期済み — ' + formatTime(lastSyncTime));
      } else {
        setSyncStatus('error', 'オフライン — ローカルに保存済み（次回自動再試行）');
        // Retry after 30 s
        setTimeout(() => { if (gasUrl) scheduleSyncWrite(); }, 30000);
      }
    }

    /** Load from GAS on startup; fall back to localStorage if unavailable */
    async function initSync() {
      if (!gasUrl) {
        setSyncStatus('offline', 'スプレッドシートURL未設定 — ローカル保存中');
        return;
      }
      showLoading('スプレッドシートからデータを読み込み中...');
      setSyncStatus('syncing', 'スプレッドシートへ接続中...');

      const remote = await gasLoad();
      hideLoading();

      if (remote) {
        state = remote;
        saveLocal(); // mirror remote to local cache
        setSyncStatus('ok', '同期済み — ' + formatTime(new Date()));
      } else {
        // Remote unavailable: use local cached data
        setSyncStatus('error', 'スプレッドシートに接続できません — ローカルデータを使用中');
      }

      renderTabs();
      renderTable();
      updateStats();
    }

    function formatTime(d) {
      return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    }

    function setSyncStatus(status, text) {
      const bar = document.getElementById('sync-bar');
      bar.className = 'sync-bar ' + status;
      document.getElementById('sync-text').textContent = text;
    }

    // ════════════════════════════════════════════════
    //  GAS URL SETUP
    // ════════════════════════════════════════════════
    function openGasModal() {
      document.getElementById('inp-gas-url').value = gasUrl;
      // 埋め込みURLが設定されている場合は入力欄を無効化して案内表示
      const inp = document.getElementById('inp-gas-url');
      const hint = document.querySelector('.gas-url-hint');
      if (EMBEDDED_GAS_URL) {
        inp.disabled = true;
        inp.style.opacity = '0.6';
        if (hint) {
          hint.innerHTML = '✅ <b>このアプリには既にGAS URLが埋め込まれています。</b><br>' +
            'すべての端末で自動的に同期されるので、個別設定は不要です。<br>' +
            'URLを変更したい場合はHTMLファイル内の <code>EMBEDDED_GAS_URL</code> を編集してください。';
        }
      } else {
        inp.disabled = false;
        inp.style.opacity = '1';
      }
      openModal('modal-gas');
    }

    async function saveGasUrl() {
      const url = document.getElementById('inp-gas-url').value.trim();
      if (!url) {
        gasUrl = '';
        localStorage.removeItem(LS_GAS);
        setSyncStatus('offline', 'スプレッドシートURL未設定 — ローカル保存中');
        closeModal('modal-gas');
        return;
      }
      if (!url.startsWith('https://script.google.com/')) {
        alert('Apps Script の Web App URL を入力してください\n（https://script.google.com/... で始まるURL）');
        return;
      }
      gasUrl = url;
      localStorage.setItem(LS_GAS, gasUrl);
      closeModal('modal-gas');

      // Test connection: try to load
      showLoading('接続テスト中...');
      setSyncStatus('syncing', '接続テスト中...');
      const remote = await gasLoad();
      hideLoading();

      if (remote) {
        state = remote;
        saveLocal();
        setSyncStatus('ok', '接続成功！ スプレッドシートと同期済み');
        renderTabs();
        renderTable();
        updateStats();
      } else {
        // First time: push local state up
        setSyncStatus('syncing', '初回データをアップロード中...');
        const ok = await gasSave(state);
        if (ok) {
          setSyncStatus('ok', '初回アップロード完了！');
        } else {
          setSyncStatus('error', 'スプレッドシートに書き込めませんでした。URLを確認してください。');
        }
      }
    }

    // ════════════════════════════════════════════════
    //  STATS
    // ════════════════════════════════════════════════
    function getStats() {
      const byLevel = { D: 0, E: 0, REQ: 0 };
      let total = 0;
      state.schools.forEach(school => {
        state.subjects.forEach(sub => {
          for (let q = 1; q <= sub.questions; q++) {
            LEVELS.forEach(lv => {
              if (isChecked(school, sub.name, q, lv)) {
                byLevel[lv]++;
                total++;
              }
            });
          }
        });
      });
      return { byLevel, total };
    }

    function getRowStats(school) {
      let total = 0, done = 0;
      state.subjects.forEach(sub => {
        for (let q = 1; q <= sub.questions; q++) {
          LEVELS.forEach(lv => {
            total++;
            if (isChecked(school, sub.name, q, lv)) done++;
          });
        }
      });
      return { total, done };
    }

    function updateStats() {
      const pillsWrap = document.getElementById('stats-pills');
      pillsWrap.innerHTML = '';

      // 科目別に D / E / REQ のカウントをpillで表示
      state.subjects.forEach(sub => {
        const counts = { D: 0, E: 0, REQ: 0 };
        state.schools.forEach(school => {
          for (let q = 1; q <= sub.questions; q++) {
            LEVELS.forEach(lv => {
              if (isChecked(school, sub.name, q, lv)) counts[lv]++;
            });
          }
        });

        // 科目名ラベル
        const label = document.createElement('span');
        label.style.cssText = 'font-size:11px;font-weight:700;color:var(--text-muted);white-space:nowrap;padding:0 4px;';
        label.textContent = sub.name;
        pillsWrap.appendChild(label);

        const pillDefs = [
          { lv: 'D', color: '#0ea5e9' },
          { lv: 'E', color: '#f59e0b' },
          { lv: 'REQ', color: '#ef4444' },
        ];
        pillDefs.forEach(({ lv, color }) => {
          const p = document.createElement('div');
          p.className = 'pill';
          p.style.cssText = `border-color:${color};color:${color};`;
          p.textContent = `${lv === 'D' ? 'A-D' : lv}: ${counts[lv]}`;
          pillsWrap.appendChild(p);
        });

        // 科目区切り
        const sep = document.createElement('span');
        sep.style.cssText = 'color:var(--border);font-size:14px;padding:0 2px;';
        sep.textContent = '|';
        pillsWrap.appendChild(sep);
      });

    }

    // ════════════════════════════════════════════════
    //  CHECK / TOGGLE
    // ════════════════════════════════════════════════
    const LEVELS = ['D', 'E', 'REQ'];

    function checkKey(subject, qnum, level) { return `${subject}__${qnum}__${level}`; }

    function isChecked(school, subject, qnum, level) {
      return !!(state.checks[school] && state.checks[school][checkKey(subject, qnum, level)]);
    }

    function toggle(school, subject, qnum, level) {
      if (!state.checks[school]) state.checks[school] = {};
      const k = checkKey(subject, qnum, level);
      state.checks[school][k] = !state.checks[school][k];
      save();
      renderTable();
      updateStats();
      if (state.checks[school][k]) confetti();
    }

    // ════════════════════════════════════════════════
    //  RENDER: TABS
    // ════════════════════════════════════════════════
    function renderTabs() {
      const wrap = document.getElementById('subject-tabs');
      wrap.innerHTML = '';
      state.subjects.forEach((sub, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab' + (i === currentSubjectIdx ? ' active' : '');
        btn.textContent = `${sub.name} (${sub.questions}問)`;
        btn.onclick = () => { currentSubjectIdx = i; renderTabs(); renderTable(); };
        wrap.appendChild(btn);
      });
      const addBtn = document.createElement('button');
      addBtn.className = 'tab-add';
      addBtn.textContent = '+';
      addBtn.title = '科目を追加';
      addBtn.onclick = openSubjectModal;
      wrap.appendChild(addBtn);
    }

    // ════════════════════════════════════════════════
    //  RENDER: TABLE
    // ════════════════════════════════════════════════
    function renderTable() {
      const sub = state.subjects[currentSubjectIdx];
      if (!sub) return;
      const thead = document.getElementById('table-head');
      const tbody = document.getElementById('table-body');

      let headHTML = '<tr>';
      headHTML += `<th class="school-col">学校</th>`;
      headHTML += `<th class="q-num" style="width:28px;min-width:28px;">Qes</th>`;
      for (let q = 1; q <= sub.questions; q++) {
        headHTML += `<th class="q-num">${q}</th>`;
      }
      headHTML += `<th class="school-col" style="width:80px;min-width:80px;text-align:center">カウント</th>`;
      headHTML += '</tr>';
      thead.innerHTML = headHTML;

      if (state.schools.length === 0) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="${sub.questions + 3}">学校がまだありません。下のボタンから追加してね！</td></tr>`;
        return;
      }

      let bodyHTML = '';
      state.schools.forEach((school, si) => {
        const color = SCHOOL_COLORS[si % SCHOOL_COLORS.length];
        const initial = school.charAt(0).toUpperCase();

        LEVELS.forEach((lv, li) => {
          const isFirst = li === 0;
          bodyHTML += `<tr class="level-row-${lv} school-${si % 2 === 0 ? 'even' : 'odd'}">`;

          // School name cell: only on first level row, spans all 3
          if (isFirst) {
            bodyHTML += `<td class="school-cell" rowspan="3" style="vertical-align:middle;">
          <div class="school-name-wrap">
            <div style="display:flex;align-items:center;gap:8px;overflow:hidden">
              <span class="school-badge" style="background:${color}22;color:${color}">${initial}</span>
              <span style="overflow:hidden;text-overflow:ellipsis;font-size:12px">${escHtml(school)}</span>
            </div>
            <button class="school-edit" onclick="openRenameModal(${si})" title="編集">✏️</button>
            <button class="school-del" onclick="deleteSchool(${si})" title="削除">✕</button>
          </div>
        </td>`;
          }

          // Level label cell
          bodyHTML += `<td class="level-cell">
        <span class="level-badge level-${lv}">${lv === "D" ? "A-D" : lv}</span>
      </td>`;

          // Check cells
          for (let q = 1; q <= sub.questions; q++) {
            const checked = isChecked(school, sub.name, q, lv);
            bodyHTML += `<td class="check-cell">
          <div class="check-btn${checked ? ' checked' : ''}"
            onclick="toggle('${escJs(school)}','${escJs(sub.name)}',${q},'${lv}')">
            <div class="check-icon">${checked ? '✓' : ''}</div>
          </div>
        </td>`;
          }

          // Per-level progress cell (D/E/REQ それぞれ個別)
          {
            let lvDone = 0;
            const lvTotal = sub.questions;
            for (let q = 1; q <= sub.questions; q++) {
              if (isChecked(school, sub.name, q, lv)) lvDone++;
            }
            const lvPct = lvTotal > 0 ? Math.round(lvDone / lvTotal * 100) : 0;
            const lvColors = { D: '#0ea5e9', E: '#f59e0b', REQ: '#ef4444' };
            bodyHTML += `<td class="row-progress level-progress" style="vertical-align:middle;">
          <div class="row-pct" style="color:${lvColors[lv]}">${lvDone}/${lvTotal}</div>
          <div class="row-bar-bg"><div class="row-bar-fill" style="width:${lvPct}%;background:${lvColors[lv]}"></div></div>
        </td>`;
          }

          bodyHTML += '</tr>';
        });
      });

      bodyHTML += `<tr class="add-row">
    <td colspan="${sub.questions + 3}">
      <button class="add-school-btn" onclick="openSchoolModal()">＋ 学校を追加</button>
    </td>
  </tr>`;
      tbody.innerHTML = bodyHTML;
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function escJs(s) {
      return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    // ════════════════════════════════════════════════
    //  SCHOOL CRUD
    // ════════════════════════════════════════════════
    function openSchoolModal() {
      document.getElementById('inp-school-name').value = '';
      openModal('modal-school');
      setTimeout(() => document.getElementById('inp-school-name').focus(), 100);
    }

    function addSchool() {
      const name = document.getElementById('inp-school-name').value.trim();
      if (!name) return;
      if (state.schools.includes(name)) { alert('同じ名前の学校がすでにあります'); return; }
      state.schools.push(name);
      if (!state.checks[name]) state.checks[name] = {};
      save();
      closeModal('modal-school');
      renderTable();
      updateStats();
    }

    function deleteSchool(idx) {
      const name = state.schools[idx];
      if (!confirm(`「${name}」を削除しますか？`)) return;
      state.schools.splice(idx, 1);
      delete state.checks[name];
      save();
      renderTable();
      updateStats();
    }

    function openRenameModal(idx) {
      document.getElementById('inp-rename-school').value = state.schools[idx];
      document.getElementById('inp-rename-idx').value = idx;
      openModal('modal-rename-school');
      setTimeout(() => document.getElementById('inp-rename-school').focus(), 100);
    }

    function renameSchool() {
      const idx = parseInt(document.getElementById('inp-rename-idx').value);
      const newName = document.getElementById('inp-rename-school').value.trim();
      if (!newName) return;
      const oldName = state.schools[idx];
      if (newName === oldName) { closeModal('modal-rename-school'); return; }
      if (state.schools.includes(newName)) { alert('同じ名前の学校がすでにあります'); return; }
      state.schools[idx] = newName;
      state.checks[newName] = state.checks[oldName] || {};
      delete state.checks[oldName];
      save();
      closeModal('modal-rename-school');
      renderTable();
      updateStats();
    }

    // ════════════════════════════════════════════════
    //  SUBJECT CRUD
    // ════════════════════════════════════════════════
    function openSubjectModal() {
      renderSubjectList();
      openModal('modal-subjects');
    }

    function renderSubjectList() {
      const list = document.getElementById('subject-list');
      list.innerHTML = '';
      state.subjects.forEach((sub, i) => {
        const div = document.createElement('div');
        div.className = 'subject-item';
        div.innerHTML = `
      <input type="text" value="${escHtml(sub.name)}" placeholder="科目名" data-idx="${i}" data-field="name">
      <input type="number" class="q-count" value="${sub.questions}" min="1" max="100" data-idx="${i}" data-field="questions">
      <span style="font-size:11px;color:var(--text-muted);white-space:nowrap">問</span>
      <button class="sub-del" onclick="removeSubjectRow(${i})">✕</button>
    `;
        list.appendChild(div);
      });
    }

    function addSubjectRow() {
      const list = document.getElementById('subject-list');
      const idx = list.children.length;
      const div = document.createElement('div');
      div.className = 'subject-item';
      div.innerHTML = `
    <input type="text" value="" placeholder="科目名" data-idx="${idx}" data-field="name">
    <input type="number" class="q-count" value="20" min="1" max="100" data-idx="${idx}" data-field="questions">
    <span style="font-size:11px;color:var(--text-muted);white-space:nowrap">問</span>
    <button class="sub-del" onclick="this.closest('.subject-item').remove()">✕</button>
  `;
      list.appendChild(div);
    }

    function removeSubjectRow(i) {
      renderSubjectList();
      const list = document.getElementById('subject-list');
      if (list.children[i]) list.children[i].remove();
    }

    function saveSubjects() {
      const items = document.querySelectorAll('.subject-item');
      const newSubs = [];
      items.forEach(item => {
        const name = item.querySelector('input:not(.q-count)').value.trim();
        const q = parseInt(item.querySelector('.q-count').value) || 20;
        if (name) newSubs.push({ name, questions: Math.min(Math.max(q, 1), 100) });
      });
      if (newSubs.length === 0) { alert('科目を1つ以上入力してください'); return; }
      state.subjects = newSubs;
      if (currentSubjectIdx >= state.subjects.length) currentSubjectIdx = 0;
      save();
      closeModal('modal-subjects');
      renderTabs();
      renderTable();
      updateStats();
    }

    // ════════════════════════════════════════════════
    //  MODAL HELPERS
    // ════════════════════════════════════════════════
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    document.querySelectorAll('.modal-overlay').forEach(m => {
      m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('modal-school').classList.contains('open')) addSchool();
        if (document.getElementById('modal-rename-school').classList.contains('open')) renameSchool();
        if (document.getElementById('modal-gas').classList.contains('open')) saveGasUrl();
      }
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
      }
    });

    // ════════════════════════════════════════════════
    //  LOADING OVERLAY
    // ════════════════════════════════════════════════
    function showLoading(msg) {
      document.getElementById('loading-text').textContent = msg || '読み込み中...';
      document.getElementById('loading-overlay').classList.add('show');
    }
    function hideLoading() {
      document.getElementById('loading-overlay').classList.remove('show');
    }

    // ════════════════════════════════════════════════
    //  CONFETTI
    // ════════════════════════════════════════════════
    function confetti() {
      const colors = ['#6157e8', '#f59e0b', '#10b981', '#0ea5e9', '#ef4444', '#ec4899', '#8b5cf6'];
      for (let i = 0; i < 10; i++) {
        const el = document.createElement('div');
        el.className = 'cf';
        const angle = Math.random() * Math.PI * 2;
        const dist = 50 + Math.random() * 80;
        el.style.setProperty('--cx', Math.cos(angle) * dist + 'px');
        el.style.setProperty('--cy', Math.sin(angle) * dist + 'px');
        el.style.background = colors[i % colors.length];
        el.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 60) + 'px';
        el.style.top = (window.innerHeight / 2) + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
      }
    }

    // ════════════════════════════════════════════════
    //  VISIBILITY: re-sync when tab becomes visible
    //  (handles phone switching apps for a while)
    // ════════════════════════════════════════════════
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && gasUrl) {
        // If >5 min since last sync, reload from server silently
        const fiveMin = 5 * 60 * 1000;
        if (!lastSyncTime || (Date.now() - lastSyncTime > fiveMin)) {
          (async () => {
            setSyncStatus('syncing', '再接続中...');
            const remote = await gasLoad();
            if (remote) {
              state = remote;
              saveLocal();
              lastSyncTime = new Date();
              setSyncStatus('ok', '同期済み — ' + formatTime(lastSyncTime));
              renderTabs();
              renderTable();
              updateStats();
            } else {
              setSyncStatus('error', 'オフライン — ローカルデータを使用中');
            }
          })();
        }
      }
    });

    // ════════════════════════════════════════════════
    //  INIT
    // ════════════════════════════════════════════════
    function updateTheadTop() {
      const syncH = document.getElementById('sync-bar')?.offsetHeight || 0;
      const topH = document.querySelector('.topbar')?.offsetHeight || 0;
      const tabsH = document.getElementById('subject-tabs')?.offsetHeight || 0;
      document.documentElement.style.setProperty('--thead-top', (syncH + topH + tabsH) + 'px');
    }

    // ════════════════════════════════════════════════
    //  上部スクロールバー ⇄ テーブル本体の同期
    // ════════════════════════════════════════════════
    function syncScrollTop() {
      const wrap = document.getElementById('tracker-wrap');
      const inner = document.getElementById('scroll-top-inner');
      if (!wrap || !inner) return;
      // テーブル本体の幅にダミー要素を合わせる
      inner.style.width = wrap.scrollWidth + 'px';
    }

    (function setupScrollSync() {
      const top = document.getElementById('scroll-top');
      const wrap = document.getElementById('tracker-wrap');
      if (!top || !wrap) return;

      let lock = false;
      top.addEventListener('scroll', () => {
        if (lock) return;
        lock = true;
        wrap.scrollLeft = top.scrollLeft;
        requestAnimationFrame(() => { lock = false; });
      });
      wrap.addEventListener('scroll', () => {
        if (lock) return;
        lock = true;
        top.scrollLeft = wrap.scrollLeft;
        requestAnimationFrame(() => { lock = false; });
      });
    })();

    // renderTable のたびにスクロール幅を合わせる必要があるので、
    // 既存の renderTable をラップして毎回 syncScrollTop を呼ぶ
    const _origRenderTable = renderTable;
    renderTable = function () {
      _origRenderTable();
      // DOM更新後に幅を計測
      requestAnimationFrame(syncScrollTop);
    };

    // Render immediately from local state (instant paint)
    renderTabs();
    renderTable();
    updateStats();
    updateTheadTop();
    syncScrollTop();
    window.addEventListener('resize', () => { updateTheadTop(); syncScrollTop(); });


    // Then attempt remote sync in background
    initSync();
  </script>
</body>

</html>
